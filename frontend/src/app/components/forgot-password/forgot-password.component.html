<div
    class="min-h-[calc(100vh-4rem)] flex items-center justify-center bg-gradient-to-br from-indigo-50 via-white to-purple-50 py-12 px-4 sm:px-6 lg:px-8">
    <div
        class="max-w-md w-full space-y-8 bg-white/80 backdrop-blur-xl p-10 rounded-3xl shadow-2xl border border-white/50">
        <div>
            <h2
                class="text-center text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">
                Forgot Password?
            </h2>
            <p class="mt-3 text-center text-sm text-gray-500">
                Enter your email address and we'll send you a link to reset your password.
            </p>
        </div>

        @if (message) {
        <div class="bg-green-50 border-l-4 border-green-400 p-4 rounded-md mb-4">
            <p class="text-sm text-green-700">{{ message }}</p>
        </div>
        }

        @if (errorMessage) {
        <div class="bg-red-50 border-l-4 border-red-400 p-4 rounded-md mb-4">
            <p class="text-sm text-red-700">{{ errorMessage }}</p>
        </div>
        }

        <form class="mt-8 space-y-6" (ngSubmit)="onSubmit()" #forgotForm="ngForm">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                <input [(ngModel)]="email" id="email" name="email" type="email" autocomplete="email" required
                    class="appearance-none relative block w-full px-4 py-3 border border-gray-200 placeholder-gray-400 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50/50"
                    placeholder="name@example.com">
            </div>

            <div>
                <button type="submit" [disabled]="isLoading || !forgotForm.form.valid"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 focus:outline-none transition-all transform hover:-translate-y-0.5 disabled:opacity-70">
                    {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
                </button>
            </div>

            <div class="text-center text-sm">
                <a routerLink="/login" class="font-medium text-indigo-600 hover:text-indigo-500">
                    Back to login
                </a>
            </div>
        </form>
    </div>
</div>
